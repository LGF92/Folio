<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Folio — PDF Reader</title>
<link rel="manifest" href="#" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #e8e4dc;
    --text-muted: #7a7570;
    --danger: #c0392b;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .logo span {
    font-style: italic;
    font-weight: 400;
  }

  .header-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  #file-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 16px;
    flex-shrink: 0;
  }

  .icon-btn:hover, .icon-btn:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.08);
  }

  .icon-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.12);
  }

  /* ─── TOOLBAR ─── */
  #toolbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 16px;
    transition: all 0.2s;
  }

  #toolbar.hidden {
    height: 0;
    overflow: hidden;
    border-bottom: none;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    height: 32px;
    min-width: 32px;
    padding: 0 10px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .nav-btn:hover:not(:disabled), .nav-btn:active:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  #page-info {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 90px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  #page-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 50px;
    height: 32px;
    text-align: center;
    border-radius: var(--radius);
    padding: 0 6px;
    transition: border-color 0.15s;
  }

  #page-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  .zoom-display {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 44px;
    text-align: center;
  }

  /* ─── MAIN AREA ─── */
  #main {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
  }

  /* ─── SIDEBAR / THUMBNAILS ─── */
  #sidebar {
    width: 180px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    padding: 12px 8px;
    gap: 8px;
    transition: transform 0.2s;
  }

  #sidebar.open {
    display: flex;
  }

  .thumb-item {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: var(--radius);
    transition: border-color 0.15s;
    overflow: hidden;
    position: relative;
  }

  .thumb-item:hover { border-color: var(--border); }
  .thumb-item.active { border-color: var(--accent); }

  .thumb-item canvas {
    width: 100% !important;
    height: auto !important;
    display: block;
  }

  .thumb-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 3px 0;
    background: var(--surface);
  }

  /* ─── CANVAS AREA ─── */
  #canvas-container {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    background: var(--bg);
    position: relative;
  }

  #canvas-container::-webkit-scrollbar { width: 6px; height: 6px; }
  #canvas-container::-webkit-scrollbar-track { background: var(--bg); }
  #canvas-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #pdf-canvas {
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    border-radius: 2px;
    display: block;
    max-width: 100%;
    transition: opacity 0.2s;
  }

  #pdf-canvas.loading { opacity: 0.4; }

  /* ─── WELCOME SCREEN ─── */
  #welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 32px;
    text-align: center;
  }

  .welcome-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 64px);
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .welcome-title em {
    font-style: italic;
    color: var(--accent2);
  }

  .welcome-sub {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 300px;
    line-height: 1.6;
    font-weight: 300;
  }

  .drop-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 40px 48px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    max-width: 340px;
    width: 100%;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200,169,110,0.05);
  }

  .drop-icon {
    font-size: 32px;
    opacity: 0.5;
  }

  .drop-text {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .drop-text strong {
    color: var(--accent);
    font-weight: 500;
  }

  .drop-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
    letter-spacing: 0.05em;
  }

  #url-form {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 340px;
  }

  #url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    border-radius: var(--radius);
    transition: border-color 0.15s;
  }

  #url-input::placeholder { color: var(--text-muted); opacity: 0.6; }
  #url-input:focus { outline: none; border-color: var(--accent); }

  #url-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  #url-btn:hover { background: var(--accent2); }

  /* ─── LOADING / PROGRESS ─── */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.3s;
    z-index: 100;
    width: 0%;
    display: none;
  }

  /* ─── READING PROGRESS ─── */
  #reading-progress {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--border);
    z-index: 20;
  }

  #reading-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
    width: 0%;
  }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 20px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ─── BOOKMARKS PANEL ─── */
  #bookmarks-panel {
    position: fixed;
    right: 0;
    top: 56px;
    bottom: 0;
    width: 240px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 30;
    display: none;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  #bookmarks-panel.open {
    display: flex;
    transform: translateX(0);
  }

  .panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }

  #bookmarks-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .bookmark-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .bookmark-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  .bookmark-page {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
  }

  .bookmark-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    font-weight: 300;
  }

  .bookmark-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .bookmark-item:hover .bookmark-del { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.7;
  }

  /* ─── FILE INPUT ─── */
  #file-input { display: none; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    #sidebar { width: 140px; }
    #bookmarks-panel { width: 200px; }
    #canvas-container { padding: 12px 8px; }
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- HEADER -->
<header>
  <div class="logo">F<span>olio</span></div>
  <div class="header-center">
    <div id="file-title">No file open</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="btn-thumb" title="Thumbnails">⊞</button>
    <button class="icon-btn" id="btn-bookmark-add" title="Bookmark page">🔖</button>
    <button class="icon-btn" id="btn-bookmarks" title="My bookmarks">📑</button>
    <button class="icon-btn" id="btn-open" title="Open PDF">📂</button>
  </div>
</header>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="nav-btn" id="btn-prev">‹</button>
  <input type="number" id="page-input" min="1" value="1">
  <span id="page-info">/ —</span>
  <button class="nav-btn" id="btn-next">›</button>
  <div class="divider"></div>
  <button class="nav-btn" id="btn-zoom-out">−</button>
  <span class="zoom-display" id="zoom-display">100%</span>
  <button class="nav-btn" id="btn-zoom-in">+</button>
  <button class="nav-btn" id="btn-zoom-fit" title="Fit width">⟺</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar"></div>
  <div id="canvas-container">
    <!-- Welcome screen -->
    <div id="welcome">
      <div>
        <div class="welcome-title">F<em>olio</em></div>
        <div style="margin-top:8px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase;">Your pocket library</div>
      </div>

      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📄</div>
        <div class="drop-text"><strong>Drop a PDF here</strong></div>
        <div class="drop-text" style="font-size:12px;">or tap to browse files</div>
        <div class="drop-hint">local files stay on your device</div>
      </div>

      <form id="url-form">
        <input type="url" id="url-input" placeholder="https://... paste a PDF url">
        <button type="submit" id="url-btn">Open</button>
      </form>
    </div>

    <canvas id="pdf-canvas" style="display:none;"></canvas>
  </div>
</div>

<!-- BOOKMARKS PANEL -->
<div id="bookmarks-panel">
  <div class="panel-header">
    Bookmarks
    <button class="panel-close" id="btn-close-bookmarks">✕</button>
  </div>
  <div id="bookmarks-list"></div>
</div>

<!-- READING PROGRESS -->
<div id="reading-progress"><div id="reading-progress-fill"></div></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".pdf,application/pdf">

<script>
// ─── PDF.js Setup ───────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── State ──────────────────────────────────────────────────
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let renderTask = null;
let bookmarks = JSON.parse(localStorage.getItem('folio_bookmarks') || '{}');
let sidebarOpen = false;
let bookmarksPanelOpen = false;
let thumbsRendered = false;
let currentFileName = '';

// ─── Elements ───────────────────────────────────────────────
const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const welcome = document.getElementById('welcome');
const toolbar = document.getElementById('toolbar');
const pageInput = document.getElementById('page-input');
const pageInfo = document.getElementById('page-info');
const zoomDisplay = document.getElementById('zoom-display');
const sidebar = document.getElementById('sidebar');
const progressBar = document.getElementById('progress-bar');
const readingFill = document.getElementById('reading-progress-fill');
const fileTitle = document.getElementById('file-title');

// ─── Load PDF ───────────────────────────────────────────────
async function loadPDF(source, name) {
  currentFileName = name || 'document.pdf';
  fileTitle.textContent = currentFileName;
  showProgress(10);
  thumbsRendered = false;
  sidebar.innerHTML = '';

  try {
    const loadingTask = pdfjsLib.getDocument(source);

    loadingTask.onProgress = (p) => {
      if (p.total) showProgress(10 + (p.loaded / p.total) * 80);
    };

    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    showProgress(95);

    welcome.style.display = 'none';
    canvas.style.display = 'block';

    // Restore saved page for this file
    const saved = localStorage.getItem('folio_page_' + currentFileName);
    currentPage = saved ? parseInt(saved) : 1;

    await renderPage(currentPage);
    showProgress(100);
    setTimeout(() => hideProgress(), 400);
    updateUI();
    toast('Opened · ' + totalPages + ' pages');

    // Auto-fit on mobile
    if (window.innerWidth < 600) fitWidth();

  } catch (e) {
    hideProgress();
    toast('⚠ Could not load PDF');
    console.error(e);
  }
}

// ─── Render Page ────────────────────────────────────────────
async function renderPage(num) {
  if (!pdfDoc) return;
  if (renderTask) renderTask.cancel();
  canvas.classList.add('loading');

  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  canvas.width = viewport.width;
  canvas.height = viewport.height;

  renderTask = page.render({ canvasContext: ctx, viewport });
  await renderTask.promise;

  canvas.classList.remove('loading');
  currentPage = num;
  pageInput.value = num;
  pageInfo.textContent = '/ ' + totalPages;
  updateReadingProgress();
  saveProgress();

  // Scroll canvas container to top
  document.getElementById('canvas-container').scrollTop = 0;

  // Update thumbnail highlight
  document.querySelectorAll('.thumb-item').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === num);
  });
}

// ─── Navigation ─────────────────────────────────────────────
function goTo(n) {
  if (!pdfDoc) return;
  n = Math.max(1, Math.min(totalPages, n));
  if (n === currentPage) return;
  renderPage(n);
}

document.getElementById('btn-prev').onclick = () => goTo(currentPage - 1);
document.getElementById('btn-next').onclick = () => goTo(currentPage + 1);

pageInput.addEventListener('change', () => {
  const n = parseInt(pageInput.value);
  if (!isNaN(n)) goTo(n);
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target === pageInput || e.target === document.getElementById('url-input')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentPage + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(currentPage - 1);
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
});

// Swipe support
let touchStartX = 0;
document.getElementById('canvas-container').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('canvas-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    dx < 0 ? goTo(currentPage + 1) : goTo(currentPage - 1);
  }
}, { passive: true });

// ─── Zoom ───────────────────────────────────────────────────
function zoomIn() {
  scale = Math.min(scale + 0.25, 5);
  if (pdfDoc) renderPage(currentPage);
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
}

function zoomOut() {
  scale = Math.max(scale - 0.25, 0.5);
  if (pdfDoc) renderPage(currentPage);
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
}

function fitWidth() {
  const container = document.getElementById('canvas-container');
  const availW = container.clientWidth - 32;
  if (!pdfDoc) return;
  pdfDoc.getPage(currentPage).then(page => {
    const vp = page.getViewport({ scale: 1 });
    scale = availW / vp.width;
    renderPage(currentPage);
    zoomDisplay.textContent = Math.round(scale * 100) + '%';
  });
}

document.getElementById('btn-zoom-in').onclick = zoomIn;
document.getElementById('btn-zoom-out').onclick = zoomOut;
document.getElementById('btn-zoom-fit').onclick = fitWidth;

// ─── File Open ──────────────────────────────────────────────
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

document.getElementById('btn-open').onclick = () => fileInput.click();
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  loadPDF({ url }, file.name);
};

// Drag & drop
const canvasContainer = document.getElementById('canvas-container');
['dragenter', 'dragover'].forEach(ev => {
  canvasContainer.addEventListener(ev, e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(ev => {
  canvasContainer.addEventListener(ev, e => {
    dropZone.classList.remove('drag-over');
  });
});
canvasContainer.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    loadPDF({ url: URL.createObjectURL(file) }, file.name);
  }
});

// URL form
document.getElementById('url-form').onsubmit = e => {
  e.preventDefault();
  const url = document.getElementById('url-input').value.trim();
  if (url) loadPDF(url, url.split('/').pop() || 'document.pdf');
};

// ─── Thumbnails ─────────────────────────────────────────────
document.getElementById('btn-thumb').onclick = async () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('open', sidebarOpen);
  document.getElementById('btn-thumb').classList.toggle('active', sidebarOpen);

  if (sidebarOpen && !thumbsRendered && pdfDoc) {
    thumbsRendered = true;
    for (let i = 1; i <= totalPages; i++) {
      const item = document.createElement('div');
      item.className = 'thumb-item' + (i === currentPage ? ' active' : '');
      item.dataset.page = i;

      const thumbCanvas = document.createElement('canvas');
      item.appendChild(thumbCanvas);

      const num = document.createElement('div');
      num.className = 'thumb-num';
      num.textContent = i;
      item.appendChild(num);

      item.onclick = () => goTo(i);
      sidebar.appendChild(item);

      // Render thumb async
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale: 0.3 });
      thumbCanvas.width = vp.width;
      thumbCanvas.height = vp.height;
      await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: vp }).promise;
    }
  }
};

// ─── Bookmarks ──────────────────────────────────────────────
document.getElementById('btn-bookmark-add').onclick = () => {
  if (!pdfDoc) { toast('Open a PDF first'); return; }
  const key = currentFileName;
  if (!bookmarks[key]) bookmarks[key] = [];
  const existing = bookmarks[key].find(b => b.page === currentPage);
  if (existing) {
    bookmarks[key] = bookmarks[key].filter(b => b.page !== currentPage);
    toast('Bookmark removed');
  } else {
    bookmarks[key].push({ page: currentPage, time: Date.now() });
    toast('Bookmarked page ' + currentPage);
  }
  saveBookmarks();
  renderBookmarks();
};

document.getElementById('btn-bookmarks').onclick = () => {
  bookmarksPanelOpen = !bookmarksPanelOpen;
  const panel = document.getElementById('bookmarks-panel');
  panel.classList.toggle('open', bookmarksPanelOpen);
  document.getElementById('btn-bookmarks').classList.toggle('active', bookmarksPanelOpen);
  renderBookmarks();
};

document.getElementById('btn-close-bookmarks').onclick = () => {
  bookmarksPanelOpen = false;
  document.getElementById('bookmarks-panel').classList.remove('open');
  document.getElementById('btn-bookmarks').classList.remove('active');
};

function renderBookmarks() {
  const list = document.getElementById('bookmarks-list');
  const key = currentFileName;
  const bks = (bookmarks[key] || []).sort((a,b) => a.page - b.page);

  if (!bks.length) {
    list.innerHTML = '<div class="empty-state">No bookmarks yet.<br>Use 🔖 to bookmark<br>the current page.</div>';
    return;
  }

  list.innerHTML = '';
  bks.forEach(b => {
    const item = document.createElement('div');
    item.className = 'bookmark-item';
    item.innerHTML = `
      <span class="bookmark-page">${b.page}</span>
      <span class="bookmark-title">Page ${b.page}</span>
      <button class="bookmark-del" data-page="${b.page}">✕</button>
    `;
    item.querySelector('.bookmark-title').onclick = () => goTo(b.page);
    item.querySelector('.bookmark-page').onclick = () => goTo(b.page);
    item.querySelector('.bookmark-del').onclick = (e) => {
      e.stopPropagation();
      bookmarks[key] = bookmarks[key].filter(x => x.page !== b.page);
      saveBookmarks();
      renderBookmarks();
    };
    list.appendChild(item);
  });
}

function saveBookmarks() {
  localStorage.setItem('folio_bookmarks', JSON.stringify(bookmarks));
}

// ─── Helpers ────────────────────────────────────────────────
function updateUI() {
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
}

function updateReadingProgress() {
  const pct = totalPages > 1 ? ((currentPage - 1) / (totalPages - 1)) * 100 : 100;
  readingFill.style.width = pct + '%';
  updateUI();
}

function saveProgress() {
  localStorage.setItem('folio_page_' + currentFileName, currentPage);
}

function showProgress(pct) {
  progressBar.style.display = 'block';
  progressBar.style.width = pct + '%';
}

function hideProgress() {
  progressBar.style.width = '100%';
  setTimeout(() => {
    progressBar.style.display = 'none';
    progressBar.style.width = '0%';
  }, 300);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── PWA Manifest (inline) ──────────────────────────────────
const manifest = {
  name: 'Folio PDF Reader',
  short_name: 'Folio',
  start_url: '.',
  display: 'standalone',
  background_color: '#0d0d0d',
  theme_color: '#0d0d0d',
  icons: [{ src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230d0d0d"/><text y=".9em" font-size="90">📖</text></svg>', sizes: 'any', type: 'image/svg+xml' }]
};
const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('manifest-link').href = URL.createObjectURL(blob);

// ─── Service Worker (inline) ────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'folio-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}
</script>
